<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShtorkyGangMusic</title>
    <!-- Подключаем Telegram WebApp JS -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: system-ui; padding: 20px; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        input, button { width: 100%; padding: 10px; margin: 10px 0; border-radius: 8px; border: 1px solid var(--tg-theme-hint-color); background: var(--tg-theme-secondary-bg-color); color: var(--tg-theme-text-color); }
        button { background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Привет, <span id="username"></span>!</h1>
    <p>Это окно — ваше мини-приложение.</p>

    <input type="text" id="userData" placeholder="Введите текст...">
    <button onclick="sendData()">Отправить данные боту</button>
    <button onclick="closeApp()">Закрыть</button>

    <script>
        // Инициализируем WebApp
        let tg = window.Telegram.WebApp;
        // Расширяем приложение на весь экран
        tg.expand();
        // Показываем имя пользователя
        let user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('username').innerText = user.first_name;
        }

        function sendData() {
            let input = document.getElementById('userData');
            let data = input.value;
            if (data) {
                // Отправляем данные обратно боту
                tg.sendData(JSON.stringify({text: data}));
                tg.close(); // Закрываем приложение после отправки
            } else {
                alert('Введите текст!');
            }
        }

        function closeApp() {
            tg.close();
        }
    </script>
</body>
</html>
